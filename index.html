<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Alquimia Urbana · board del grupo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

<style>
/* ====== board grupal: gantt de trámites (solo presentación) ====== */
main{max-width:1280px;}
/* ---- hero "¿dónde estamos?" (tiempo + dinero, estilo Hormozi) ---- */
.auhero{margin:14px 0 4px;}
.auh-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:9px;flex-wrap:wrap;}
.auh-ttl{font-size:20px;color:var(--marino,#0F1F3D);font-weight:600;}
.auh-links{display:flex;gap:14px;font-size:12.5px;}
.auh-links a{color:var(--oro,#B8954B);text-decoration:none;border-bottom:1px solid rgba(184,149,75,.35);}
.augrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:820px){.augrid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:480px){.augrid{grid-template-columns:1fr;}}
.aucard{background:#fff;border:1px solid rgba(15,31,61,.10);border-radius:12px;padding:13px 14px;box-shadow:0 1px 2px rgba(15,31,61,.04);}
.aucard .auk{font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--oro,#B8954B);font-weight:600;margin-bottom:5px;}
.aucard .aubig{font-family:'Cormorant Garamond',Georgia,serif;font-size:27px;line-height:1.05;color:var(--marino,#0F1F3D);font-weight:600;}
.aucard .aubig.sm{font-size:16px;font-family:Inter,system-ui,sans-serif;font-weight:600;line-height:1.25;}
.aucard .aubig .aud{font-size:15px;color:#8a8578;font-weight:500;}
.aucard .ausub{font-size:12px;color:#5b5648;margin-top:5px;line-height:1.35;}
.aucard .aubar{height:5px;border-radius:3px;background:rgba(15,31,61,.08);margin-top:9px;overflow:hidden;}
.aucard .aubar i{display:block;height:100%;background:linear-gradient(90deg,var(--oro,#B8954B),var(--oroc,#C9A86A));}
.aucard.cuello{cursor:pointer;border-color:rgba(180,83,9,.35);background:linear-gradient(180deg,#fff,#fff8f0);}
.aucard.cuello:hover{border-color:var(--amar,#B45309);box-shadow:0 2px 8px rgba(180,83,9,.12);}
.aucard.vacio{background:repeating-linear-gradient(135deg,#fff 0 10px,#faf7f0 10px 20px);border-style:dashed;}
header{background:var(--negro);border-bottom:0;}
header .logo{display:flex;align-items:center;gap:8px;}
header .logo img{height:20px;filter:brightness(0) invert(1);opacity:.95;}
header .logo .t{color:#F7F1E5;}
header .logo .sub{color:rgba(247,241,229,.55);border-left-color:rgba(201,168,106,.3);}
#badge{border-color:rgba(201,168,106,.35);color:rgba(247,241,229,.8);background:transparent;}
.pstrip{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 10px;}
.pchip{border:1px solid var(--linea);background:#fff;border-radius:20px;padding:7px 14px;font-size:12.5px;cursor:pointer;display:flex;align-items:center;gap:8px;}
.pchip .dot{width:9px;height:9px;border-radius:50%;background:var(--piedra);flex:0 0 auto;}
.pchip.verde .dot{background:var(--verde);} .pchip.amar .dot{background:var(--amar);} .pchip.rojo .dot{background:var(--rojo);}
.pchip.on{background:var(--negro);color:#fff;border-color:var(--negro);}
.pchip .et{color:var(--piedra);font-size:11px;} .pchip.on .et{color:#c9b7a0;}
.resumen{display:flex;gap:14px;flex-wrap:wrap;align-items:center;font-size:12.5px;background:#fff;border:1px solid var(--linea);border-radius:10px;padding:9px 14px;margin-bottom:10px;}
.resumen b{font-family:'Cormorant Garamond',Georgia,serif;font-weight:normal;font-size:15px;}
.gtools{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:8px;}
.gtools .sep{flex:1;}
.zbtn{border:1px solid var(--linea);background:#fff;border-radius:8px;width:30px;height:28px;font-size:15px;cursor:pointer;}
.leyenda{font-size:10.5px;color:var(--piedra);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.leyenda i{display:inline-block;width:14px;height:9px;border-radius:3px;margin-right:3px;vertical-align:-1px;}
/* gantt */
.gwrap{overflow-x:auto;background:#fff;border:1px solid var(--linea);border-radius:10px;position:relative;}
.gcanvas{position:relative;}
.ghead{display:flex;position:relative;border-bottom:1px solid var(--linea);height:34px;}
.ghead .gl{position:sticky;left:0;z-index:6;background:#fff;border-right:1px solid var(--linea);flex:0 0 auto;display:flex;align-items:center;padding:0 10px;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--piedra);}
.ghead .mes{position:absolute;top:0;height:100%;border-left:1px solid var(--arena);font-size:10px;color:var(--carbon);padding:9px 0 0 6px;white-space:nowrap;overflow:hidden;}
.gbody{position:relative;}
.grow{display:flex;height:32px;align-items:center;border-bottom:1px solid #f4f2ee;position:relative;}
.grow.grp{height:30px;background:var(--arena);border-bottom:1px solid var(--linea);}
.grow .gl{position:sticky;left:0;z-index:5;background:inherit;border-right:1px solid var(--linea);flex:0 0 auto;height:100%;display:flex;align-items:center;gap:6px;padding:0 10px;font-size:11.5px;cursor:pointer;overflow:hidden;white-space:nowrap;}
.grow:not(.grp) .gl{background:#fff;}
.grow .gl .tid{font-size:9px;color:var(--piedra);flex:0 0 auto;}
.grow .gl .ic{font-size:10px;flex:0 0 auto;}
.grow.grp .gl{font-family:'Cormorant Garamond',Georgia,serif;font-size:12.5px;letter-spacing:.5px;}
.grow .zona{position:relative;flex:0 0 auto;height:100%;}
.gbar{position:absolute;top:8px;height:15px;border-radius:4px;background:var(--piedra);cursor:pointer;min-width:7px;box-shadow:0 1px 2px rgba(0,0,0,.12);}
.gbar.verde{background:var(--verde);} .gbar.amar{background:var(--amar);} .gbar.rojo{background:var(--rojoclaro);}
.gbar.inferido{opacity:.65;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.25) 0 5px,transparent 5px 10px);}
.gbar.sel{outline:2.5px solid var(--negro);z-index:4;}
.dim .gbar:not(.chain){opacity:.16;}
.dim .grow:not(.inchain) .gl{opacity:.35;}
svg.garrows{position:absolute;top:0;pointer-events:none;z-index:3;}
svg.garrows path{fill:none;stroke:#b9b3aa;stroke-width:1.4;}
svg.garrows path.chain{stroke:var(--negro);stroke-width:2.2;}
.dim svg.garrows path:not(.chain){opacity:.12;}
.hoy{position:absolute;top:0;bottom:0;width:0;border-left:2px solid var(--rojo);z-index:2;}
.hoy span{position:absolute;top:2px;left:4px;font-size:9px;color:var(--rojo);background:#fff;border-radius:6px;padding:0 4px;}
.wline{position:absolute;top:0;bottom:0;border-left:1px solid #f6f4f0;z-index:0;}
.mline{border-left:1px solid var(--arena);}
/* drawer ficha */
#drawer{position:fixed;top:0;right:-420px;width:min(400px,94vw);height:100%;background:var(--crema);border-left:1px solid var(--linea);z-index:120;transition:right .22s;overflow-y:auto;padding:18px 20px 40px;box-shadow:-12px 0 30px rgba(26,24,24,.12);}
#drawer.on{right:0;}
#drawer .x{float:right;cursor:pointer;font-size:22px;color:var(--piedra);line-height:1;}
#drawer h3{font-family:'Cormorant Garamond',Georgia,serif;font-weight:normal;font-size:21px;margin:8px 0 4px;line-height:1.2;}
#drawer .st{font-size:9.5px;letter-spacing:1px;text-transform:uppercase;display:inline-flex;align-items:center;gap:5px;}
#drawer .st .p{width:9px;height:9px;border-radius:50%;background:var(--piedra);}
#drawer .st.verde .p{background:var(--verde);} #drawer .st.amar .p{background:var(--amar);} #drawer .st.rojo .p{background:var(--rojo);}
#drawer .fld{margin-top:10px;font-size:12.5px;}
#drawer .fld .k{font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--piedra);}
#drawer .depchip{display:inline-block;border:1px solid var(--linea);background:#fff;border-radius:14px;padding:3px 10px;font-size:11px;cursor:pointer;margin:3px 4px 0 0;}
#drawer .btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;}
#drawer .btns a{text-decoration:none;}
.sinlive{background:#fff;border:1px dashed var(--linea);border-radius:10px;padding:22px;text-align:center;color:var(--carbon);font-size:13px;}
.sinlive .btns{margin-top:12px;display:flex;gap:8px;justify-content:center;}
.sinlive a{text-decoration:none;}
</style>
</head>

<script>
(function(){
"use strict";
/* La clave NO vive aquí: la teclea el usuario y la valida el
   SERVIDOR contra CONFIG.clave del Sheet Registro (sheet-driven). */
var CONFIG={EXEC_URL:"https://script.google.com/macros/s/AKfycbwIkonz5lbmtdQQw33foXc_5DRDwoTiuaJgoM7LQILtRN1lx9uFUAhb-jgJhCnRzfPQ/exec"};
var KEY_STORE="au_clave_v1", FETCH_TIMEOUT=15000;
var ROWH=32, GRPH=30, LABELW=270, HEADH=34, DIA_MS=86400000;
var DATA=null, SEL_P=0, SEL_T=null, FILTRO="todos", PXD=2.4, _PLAN=null, _ETAPA_ID=null;

function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function safeUrl(u){u=String(u==null?"":u).trim();return /^https:\/\//i.test(u)?u:"";}
function money(n){n=Number(String(n).replace(/[^0-9.\-]/g,""));if(isNaN(n)||n===0)return"";return"$"+Math.round(n).toLocaleString("es-MX");}
function toast(m,w){var t=$("toast");t.textContent=m;t.className="on"+(w?" warn":"");setTimeout(function(){t.className="";},3400);}
function badge(s,txt){var b=$("badge");b.setAttribute("data-s",s);$("badgeTxt").textContent=txt;}
function claveGuardada(){try{return localStorage.getItem(KEY_STORE)||"";}catch(e){return"";}}
function guardarClave(k){try{localStorage.setItem(KEY_STORE,k);}catch(e){}}
function borrarClave(){try{localStorage.removeItem(KEY_STORE);}catch(e){}}

/* ---------- red ---------- */
function fetchGrupo(k,refrescar){
  if(CONFIG.EXEC_URL.indexOf("https://script.google.com/")!==0){
    var err=new Error("config");err.name="ConfigError";return Promise.reject(err);
  }
  var url=CONFIG.EXEC_URL+"?recurso=grupo&k="+encodeURIComponent(k)+(refrescar?"&refrescar=1":"")+"&cb="+Date.now();
  var ctrl=new AbortController();var to=setTimeout(function(){ctrl.abort();},FETCH_TIMEOUT);
  return fetch(url,{signal:ctrl.signal}).then(function(r){clearTimeout(to);return r.json();},function(e){clearTimeout(to);throw e;});
}
function errorRed(e){
  if(e&&e.name==="ConfigError"){badge("error","sin configurar");toast("Falta la URL /exec en CONFIG.EXEC_URL",true);return;}
  badge("error",e&&e.name==="AbortError"?"sin respuesta":"sin conexión");
  toast(e&&e.name==="AbortError"?"El servidor tardó demasiado; toca el badge para reintentar":"No se pudo cargar el board",true);
}
function pedirClave(){
  if($("gate"))return;
  document.body.insertAdjacentHTML("beforeend",
    '<div id="gate"><div class="box"><div class="serif" style="font-size:22px;">Alquimia Urbana</div>'+
    '<div class="nota" style="margin-top:4px;">Board del grupo · acceso con clave</div>'+
    '<input id="gKey" type="password" placeholder="Clave de acceso" autocomplete="off">'+
    '<button class="btn" style="width:100%;" id="gBtn">Entrar</button></div></div>');
  var entrar=function(){
    var k=($("gKey").value||"").trim();
    if(!k)return;
    $("gBtn").disabled=true;$("gBtn").textContent="Verificando…";
    fetchGrupo(k,false).then(function(d){
      if(d.ok){guardarClave(k);var g=$("gate");g.parentNode.removeChild(g);badge("live","en vivo");DATA=d;pintar();}
      else{$("gBtn").disabled=false;$("gBtn").textContent="Entrar";
        toast(d.error==="clave"?"Clave incorrecta":"Error del servidor: "+(d.error||""),true);}
    }).catch(function(e){$("gBtn").disabled=false;$("gBtn").textContent="Entrar";errorRed(e);});
  };
  $("gBtn").onclick=entrar;
  $("gKey").addEventListener("keydown",function(ev){if(ev.key==="Enter")entrar();});
  $("gKey").focus();
}
function cargar(refrescar){
  var k=claveGuardada();
  if(!k){pedirClave();return;}
  badge("loading","cargando");
  fetchGrupo(k,refrescar).then(function(d){
    if(!d.ok){
      if(d.error==="clave"){borrarClave();badge("error","clave");
        toast("La clave cambió en el Sheet Registro — vuelve a entrar",true);
        SEL_T=null;cerrarDrawer();
        $("app").innerHTML="";pedirClave();return;}
      badge("error","error");toast("Error del servidor: "+(d.error||""),true);return;
    }
    badge("live","en vivo");DATA=d;pintar();
    /* re-sincronizar el drawer con los datos frescos */
    var p=(DATA.proyectos||[])[SEL_P];
    if(SEL_T&&p&&p.live&&p.live.tramites.some(function(t){return t.id===SEL_T;})){
      abrirFicha(p,SEL_T);
    }else if(SEL_T){SEL_T=null;cerrarDrawer();}
  }).catch(errorRed);
}

/* ---------- fechas / plan del gantt ---------- */
function pf(s){ /* "YYYY" | "YYYY-MM" | "YYYY-MM-DD" -> Date|null */
  s=String(s||"").trim();if(!s)return null;
  var m=s.match(/^(\d{4})(?:-(\d{1,2}))?(?:-(\d{1,2}))?/);
  if(!m)return null;
  return new Date(Number(m[1]),Number(m[2]||1)-1,Number(m[3]||1),12);
}
function addSem(d,s){return new Date(d.getTime()+s*7*DIA_MS);}
function planear(items){
  var hoy=new Date();hoy.setHours(12,0,0,0);
  var por={};items.forEach(function(t){por[t.id]=t;});
  items.forEach(function(t){
    t._deps=String(t.dep||"").split(/[,;\s]+/).map(function(x){return x.trim();}).filter(function(x){return x&&por[x];});
    t._ini=null;t._fin=null;t._inferido=false;
    var fin=pf(t.fin),ini=pf(t.ini),dur=t.dur>0?t.dur:(t.estado==="verde"?2:4);
    if(t.estado==="verde"&&fin){t._fin=fin;t._ini=ini||addSem(fin,-dur);}
    else if(ini){t._ini=ini;t._fin=addSem(ini,dur);}
  });
  /* HECHOS sin fecha: anclarlos al bloque histórico de su etapa;
     el pasado jamás se proyecta a futuro */
  items.forEach(function(t){
    if(t.estado!=="verde"||t._ini)return;
    var ancla=null;
    items.forEach(function(x){if(x.estado==="verde"&&x._fin&&x.paquete===t.paquete&&(!ancla||x._fin>ancla))ancla=x._fin;});
    t._fin=ancla||hoy;t._ini=addSem(t._fin,-(t.dur>0?t.dur:2));t._inferido=true;
  });
  /* pendientes sin fecha NI dependencias: piso = hoy (antes del loop
     para que sus dependientes hereden ese piso) */
  items.forEach(function(t){
    if(!t._ini&&!t._deps.length){t._ini=hoy;t._fin=addSem(t._ini,t.dur>0?t.dur:4);t._inferido=true;}
  });
  /* inferir por dependencias SOLO cuando todas ya tienen fin
     (pasadas iterativas; pase 9 = red para ciclos) */
  for(var pase=0;pase<10;pase++){
    var cambio=false;
    items.forEach(function(t){
      if(t._ini)return;
      var listo=t._deps.length&&t._deps.every(function(d){return por[d]&&por[d]._fin;});
      if(listo||pase===9){
        var maxFin=null;
        t._deps.forEach(function(d){var p=por[d];if(p&&p._fin&&(!maxFin||p._fin>maxFin))maxFin=p._fin;});
        t._ini=maxFin||hoy;
        t._fin=addSem(t._ini,t.dur>0?t.dur:4);
        t._inferido=true;cambio=true;
      }
    });
    if(!cambio)break;
  }
  items.forEach(function(t){if(!t._ini){t._ini=hoy;t._fin=addSem(hoy,4);t._inferido=true;}});
  return {items:items,por:por,hoy:hoy};
}
function cadena(por,items,id){ /* ancestros + descendientes */
  var set={};set[id]=true;
  var abajo={},arriba={};
  items.forEach(function(t){t._deps.forEach(function(d){(abajo[d]=abajo[d]||[]).push(t.id);(arriba[t.id]=arriba[t.id]||[]).push(d);});});
  var bfs=function(start,mapa){var q=[start],vis={};while(q.length){var c=q.shift();(mapa[c]||[]).forEach(function(n){if(!vis[n]){vis[n]=true;set[n]=true;q.push(n);}});}};
  bfs(id,abajo);bfs(id,arriba);
  return set;
}

/* ---------- hero "¿dónde estamos?" ---------- */
function nInt(v){v=Number(String(v==null?"":v).replace(/[^0-9.\-]/g,""));return isNaN(v)?0:v;}
function cuello(tr){
  /* el trámite pendiente que, al cerrarse, desbloquea MÁS río abajo
     (la restricción de Goldratt/Hormozi: "empieza por el cuello") */
  var por={},abajo={};
  tr.forEach(function(t){por[t.id]=t;});
  tr.forEach(function(t){String(t.dep||"").split(/[,;\s]+/).forEach(function(d){d=d.trim();if(d&&por[d])(abajo[d]=abajo[d]||[]).push(t.id);});});
  function desc(id){var q=[id],vis={},n=0;while(q.length){var c=q.shift();(abajo[c]||[]).forEach(function(x){if(!vis[x]){vis[x]=true;n++;q.push(x);}});}return n;}
  var best=null,bs=-1;
  tr.forEach(function(t){
    if(t.estado==="verde")return;
    var n=desc(t.id),score=n*10+(t.urgente?5:0)+(t.estado==="amar"?1:0);
    if(score>bs){bs=score;best=t;best._desc=n;}
  });
  return best;
}
function heroHTML(p,L,pm2){
  var escl=L.escalera||[];
  var stepAct=escl.filter(function(s){return s.nombre===L.etapa;})[0];
  var ordenAct=stepAct?stepAct.orden:(escl.filter(function(s){return s.estado==="verde";}).length+1);
  var totalEt=escl.length||6;
  var pct=L.conteos.total?Math.round(L.conteos.verde/L.conteos.total*100):0;
  var cu=cuello(p.live.tramites.slice());
  var uc=L.ultimo_cierre||{};
  var dias=(uc.fecha&&pf(uc.fecha))?Math.floor((Date.now()-pf(uc.fecha).getTime())/DIA_MS):null;
  var pres=nInt(p.presupuesto),pag=nInt(p.pagado),tieneDin=pres>0,pctEx=tieneDin?(pag/pres*100):0,pctDin=pctEx<10?(Math.round(pctEx*10)/10):Math.round(pctEx);
  var h='<div class="auhero"><div class="auh-top"><span class="auh-ttl serif">'+esc(p.nombre)+' — ¿dónde estamos?</span>'+
    '<span class="auh-links">'+
    (safeUrl(p.board_url)?('<a href="'+esc(safeUrl(p.board_url))+'" target="_blank" rel="noopener">abrir board →</a>'):'')+
    (safeUrl(p.carpeta_drive_url)?('<a href="'+esc(safeUrl(p.carpeta_drive_url))+'" target="_blank" rel="noopener">carpeta Drive</a>'):'')+
    '</span></div><div class="augrid">';
  /* AVANCE */
  h+='<div class="aucard"><div class="auk">Avance</div>'+
     '<div class="aubig">Etapa '+ordenAct+' <span class="aud">/ '+totalEt+'</span></div>'+
     '<div class="ausub">'+esc(L.etapa)+' · '+pct+'% trámites · 🔒 '+L.candados.cerrados+'/'+L.candados.total+' candados</div>'+
     '<div class="aubar"><i style="width:'+Math.round(ordenAct/totalEt*100)+'%;"></i></div></div>';
  /* CUELLO (la restricción) */
  if(cu){
    h+='<div class="aucard cuello" data-t="'+esc(cu.id)+'"><div class="auk">El cuello — empieza aquí</div>'+
       '<div class="aubig sm">'+esc(cu.nombre)+'</div>'+
       '<div class="ausub">desbloquea <b>'+(cu._desc||0)+'</b> trámites río abajo · '+(cu.estado==="amar"?"en proceso":"falta")+(cu.urgente?" · 🔥 urgente":"")+'</div></div>';
  }
  /* RITMO / última victoria */
  h+='<div class="aucard"><div class="auk">Ritmo · última victoria</div>'+
     '<div class="aubig">'+(dias!=null?('hace '+dias+' <span class="aud">días</span>'):'—')+'</div>'+
     '<div class="ausub">'+(uc.nombre?esc(uc.nombre):'—')+' · en proceso '+L.conteos.amar+' · faltan '+L.conteos.rojo+(L.urgentes?(' · '+L.urgentes+' 🔥'):'')+'</div></div>';
  /* DINERO */
  h+='<div class="aucard'+(tieneDin?'':' vacio')+'"><div class="auk">Dinero</div>';
  if(tieneDin){
    h+='<div class="aubig">'+pctDin+'% <span class="aud">ejercido</span></div>'+
       '<div class="ausub">'+money(pag)+' de '+money(pres)+(pm2?(' · '+pm2+'/m²'):'')+'</div>'+
       '<div class="aubar"><i style="width:'+Math.max(1.5,Math.min(100,pctEx))+'%;"></i></div>';
  }else{
    h+='<div class="aubig sm">🔒 Por capturar</div>'+
       '<div class="ausub">llena <b>presupuesto</b> y <b>pagado</b> en el Sheet Registro para prender esta tarjeta'+(pm2?(' · valor '+pm2+'/m²'):'')+'</div>';
  }
  h+='</div></div></div>';
  return h;
}

  var h="";
  /* selector de proyectos (compacto, nada de tarjetas dispersas) */
  h+='<div class="pstrip">';
  proys.forEach(function(p,i){
    var cl=p.live?(p.live.urgentes>0?"rojo":"amar"):"";
    if(p.live&&p.live.etapa==="Completado")cl="verde";
    h+='<div class="pchip '+cl+(i===SEL_P?" on":"")+'" data-p="'+i+'"><span class="dot"></span>'+esc(p.nombre)+
       '<span class="et">'+esc(p.live?p.live.etapa:(p.etapa||"—"))+'</span></div>';
  });
  h+='</div>';
  var p=proys[SEL_P];
  if(p){
    if(p.live){
      var L=p.live,pm2=money(L.precio_m2);
      h+=heroHTML(p,L,pm2);
      h+='<div class="gtools">'+
         ['todos|Todos','urgente|🔥 Urgente','atacable|⚡ Atacable','critica|◆ Ruta crítica','banco|🏦 Banco','fisica|🏗 Física','etapa|📍 Etapa','faltan|Faltan','hechos|Hechos'].map(function(f){
           var kv=f.split("|");
           return '<span class="chip'+(FILTRO===kv[0]?" on":"")+'" data-f="'+kv[0]+'">'+kv[1]+'</span>';
         }).join("")+
         '<span class="sep"></span>'+
         '<span class="leyenda"><span><i style="background:var(--verde);"></i>hecho</span>'+
         '<span><i style="background:var(--amar);"></i>en proceso</span>'+
         '<span><i style="background:var(--rojoclaro);"></i>falta</span>'+
         '<span><i style="background:var(--piedra);opacity:.6;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.4) 0 4px,transparent 4px 8px);"></i>estimado por dependencias</span>'+
         '<span>🔒 candado · 🔥 urgente · 🏦/🏗 ruta crítica</span></span>'+
         '<button class="zbtn" id="zMenos">−</button><button class="zbtn" id="zMas">+</button>'+
         '</div>';
      h+='<div class="gwrap" id="gwrap"></div>';
    }else{
      h+='<div class="resumen"><b>'+esc(p.nombre)+'</b><span>'+esc(p.tipo||"")+'</span><span>Etapa: <strong>'+esc(p.etapa||"—")+'</strong></span>'+(p.eta?('<span>ETA: '+esc(p.eta)+'</span>'):'')+'</div>';
      h+='<div class="sinlive">Este proyecto aún no tiene Sheet Maestro conectado — su gráfica de trámites aparecerá aquí sola cuando se conecte (fase de recetas).'+
         (p.siguiente_paso?('<br><br>Siguiente paso registrado: <strong>'+esc(p.siguiente_paso)+'</strong>'):'')+
         '<div class="btns">'+
         (safeUrl(p.board_url)?('<a class="btn" href="'+esc(safeUrl(p.board_url))+'" target="_blank" rel="noopener">Abrir board</a>'):'')+
         (safeUrl(p.carpeta_drive_url)?('<a class="btn ghost" href="'+esc(safeUrl(p.carpeta_drive_url))+'" target="_blank" rel="noopener">Carpeta Drive</a>'):'')+
         '</div></div>';
    }
  }
  var ru=d.config&&safeUrl(d.config.registro_url),cru=d.config&&safeUrl(d.config.carpeta_raiz_url);
  var extra=[];
  if(ru)extra.push('<a href="'+esc(ru)+'" target="_blank" rel="noopener">✎ abrir el Sheet Registro</a>');
  if(cru)extra.push('<a href="'+esc(cru)+'" target="_blank" rel="noopener">🗂 carpeta raíz en Drive</a>');
  h+='<div class="hint" style="margin-top:12px;">Agregar un proyecto = agregar una fila en el Sheet Registro (sus carpetas de Drive se crean solas).'+(extra.length?(' '+extra.join(' · ')):'')+'</div>';
  $("app").innerHTML=h;
  $("stamp").textContent="Actualizado: "+(d.meta&&d.meta.actualizado?new Date(d.meta.actualizado).toLocaleString("es-MX"):"—");

  Array.prototype.forEach.call(document.querySelectorAll(".pchip"),function(el){
    el.onclick=function(){SEL_P=Number(el.getAttribute("data-p"));SEL_T=null;cerrarDrawer();pintar();};
  });
  Array.prototype.forEach.call(document.querySelectorAll(".gtools .chip"),function(el){
    el.onclick=function(){FILTRO=el.getAttribute("data-f");SEL_T=null;cerrarDrawer();pintar();};
  });
  var _cu=document.querySelector(".aucard.cuello[data-t]");
  if(_cu){_cu.onclick=function(){seleccionar(_cu.getAttribute("data-t"));};}
  if($("zMas")){$("zMas").onclick=function(){PXD=Math.min(8,PXD*1.4);pintarGantt();};}
  if($("zMenos")){$("zMenos").onclick=function(){PXD=Math.max(.9,PXD/1.4);pintarGantt();};}
  pintarGantt();
}

function filtrar(t){
  switch(FILTRO){
    case "urgente": return !!t.urgente;
    case "atacable": return t.estado!=="verde" && !!t._deps && t._deps.every(function(d){return _PLAN&&_PLAN.por[d]&&_PLAN.por[d].estado==="verde";});
    case "critica": return t.rc==="banco"||t.rc==="fisica";
    case "banco": return t.rc==="banco";
    case "fisica": return t.rc==="fisica";
    case "etapa": return t.paquete===_ETAPA_ID;
    case "faltan": return t.estado!=="verde";
    case "hechos": return t.estado==="verde";
  }
  return true;
}

function pintarGantt(){
  var wrap=$("gwrap");if(!wrap)return;
  var p=(DATA.proyectos||[])[SEL_P];if(!p||!p.live)return;
  /* nombres de paquetes fuera de la escalera: CONFIG.nombres_paquetes
     del Sheet Registro ("id:Nombre|id2:Nombre2") — nada en código */
  var NX={};
  String((DATA.config&&DATA.config.nombres_paquetes)||"").split("|").forEach(function(par){
    var i=par.indexOf(":");if(i>0)NX[par.slice(0,i).trim()]=par.slice(i+1).trim();
  });
  var labelw=window.innerWidth<600?Math.max(96,Math.min(160,Math.round(window.innerWidth*0.32))):LABELW;
  var plan=planear(p.live.tramites.slice());
  _PLAN=plan;
  var _ea=(p.live.escalera||[]).filter(function(s){return s.nombre===p.live.etapa;})[0];
  _ETAPA_ID=_ea?_ea.id:null;
  var items=plan.items.filter(filtrar);
  if(!items.length){wrap.innerHTML='<div class="sinlive" style="border:0;">Sin trámites con este filtro.</div>';return;}

  /* rango temporal */
  var min=null,max=null;
  items.forEach(function(t){if(!min||t._ini<min)min=t._ini;if(!max||t._fin>max)max=t._fin;});
  if(plan.hoy<min)min=plan.hoy; if(plan.hoy>max)max=plan.hoy;
  min=new Date(min.getTime()-10*DIA_MS);max=new Date(max.getTime()+28*DIA_MS);
  var X=function(fecha){return Math.round((fecha-min)/DIA_MS*PXD);};
  var chartW=X(max)+40;

  /* grupos por etapa (orden de la escalera) */
  var orden={};(p.live.escalera||[]).forEach(function(e){orden[e.id]=e.orden;});
  var nombres={};(p.live.escalera||[]).forEach(function(e){nombres[e.id]=e.nombre;});
  var grupos={};
  items.forEach(function(t){(grupos[t.paquete]=grupos[t.paquete]||[]).push(t);});
  var gkeys=Object.keys(grupos).sort(function(a,b){return (orden[a]||99)-(orden[b]||99);});
  gkeys.forEach(function(g){grupos[g].sort(function(a,b){return a._ini-b._ini;});});

  /* filas */
  var filas=[],y=0;
  gkeys.forEach(function(g){
    filas.push({tipo:"grp",id:g,nombre:nombres[g]||NX[g]||g,y:y});y+=GRPH;
    grupos[g].forEach(function(t){t._y=y;filas.push({tipo:"t",t:t,y:y});y+=ROWH;});
  });
  var totalH=y;

  /* meses */
  var mh="",c=new Date(min.getFullYear(),min.getMonth(),1,12);
  var MESES=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  while(c<max){
    var x0=Math.max(0,X(c));
    mh+='<div class="mes" style="left:'+x0+'px;">'+MESES[c.getMonth()]+' '+String(c.getFullYear()).slice(2)+'</div>';
    c=new Date(c.getFullYear(),c.getMonth()+1,1,12);
  }
  /* semanas + lineas de mes */
  var wl="",w=new Date(min.getTime());
  w.setDate(w.getDate()+((8-w.getDay())%7)); /* proximo lunes */
  while(w<max){wl+='<div class="wline'+(w.getDate()<=7?" mline":"")+'" style="left:'+X(w)+'px;"></div>';w=new Date(w.getTime()+7*DIA_MS);}

  var visibles={};items.forEach(function(t){visibles[t.id]=t;});
  /* la cadena se calcula sobre TODOS los tramites (el filtro solo
     decide que filas se pintan) */
  var enCadena=SEL_T&&visibles[SEL_T]?cadena(plan.por,plan.items,SEL_T):null;

  var b="";
  b+='<div class="gcanvas" style="width:'+(labelw+chartW)+'px;">';
  b+='<div class="ghead"><div class="gl" style="width:'+labelw+'px;">trámite</div><div style="position:relative;width:'+chartW+'px;">'+mh+'</div></div>';
  b+='<div class="gbody'+(enCadena?" dim":"")+'" style="height:'+totalH+'px;">';
  filas.forEach(function(f){
    if(f.tipo==="grp"){
      b+='<div class="grow grp"><div class="gl" style="width:'+labelw+'px;">'+esc(f.nombre)+'</div><div class="zona" style="width:'+chartW+'px;"></div></div>';
    }else{
      var t=f.t,ic="";
      if(t.gate)ic+="🔒";if(t.urgente)ic+="🔥";
      if(t.rc==="banco")ic+="🏦";if(t.rc==="fisica")ic+="🏗";
      var inch=enCadena&&enCadena[t.id];
      b+='<div class="grow'+(inch?" inchain":"")+'" data-t="'+esc(t.id)+'">'+
         '<div class="gl" style="width:'+labelw+'px;" title="'+esc(t.nombre)+'"><span class="tid">'+esc(t.id)+'</span><span style="overflow:hidden;text-overflow:ellipsis;">'+esc(t.nombre)+'</span><span class="ic">'+ic+'</span></div>'+
         '<div class="zona" style="width:'+chartW+'px;">'+wl+
         '<div class="gbar '+t.estado+(t._inferido?" inferido":"")+(SEL_T===t.id?" sel":"")+(inch?" chain":"")+'" data-t="'+esc(t.id)+'" style="left:'+X(t._ini)+'px;width:'+Math.max(7,X(t._fin)-X(t._ini))+'px;" title="'+esc(t.id+" · "+t.nombre)+'"></div>'+
         '</div></div>';
    }
  });
  /* flechas de dependencias (solo entre visibles) */
  var paths="";
  items.forEach(function(t){
    t._deps.forEach(function(dp){
      var s=visibles[dp];if(!s)return;
      var x1=X(s._fin),y1=s._y+ROWH/2,x2=X(t._ini),y2=t._y+ROWH/2;
      var dx=Math.max(18,(x2-x1)/2);
      var cl=enCadena&&enCadena[t.id]&&enCadena[dp]?' class="chain"':'';
      paths+='<path'+cl+' d="M'+x1+' '+y1+' C'+(x1+dx)+' '+y1+', '+(x2-dx)+' '+y2+', '+(x2-3)+' '+y2+'" marker-end="url(#pta)"/>';
    });
  });
  b+='<svg class="garrows" style="left:'+labelw+'px;width:'+chartW+'px;height:'+totalH+'px;">'+
     '<defs><marker id="pta" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0 0 L7 3.5 L0 7 z" fill="#8b8782"/></marker></defs>'+paths+'</svg>';
  b+='<div class="hoy" style="left:'+(labelw+X(plan.hoy))+'px;"><span>hoy</span></div>';
  b+='</div></div>';
  wrap.innerHTML=b;
  /* abrir centrado en HOY (o en el tramite seleccionado) */
  var foco=SEL_T&&visibles[SEL_T]?X(visibles[SEL_T]._ini):X(plan.hoy);
  wrap.scrollLeft=Math.max(0,foco-(wrap.clientWidth-labelw)*0.42);

  Array.prototype.forEach.call(wrap.querySelectorAll("[data-t]"),function(el){
    el.onclick=function(ev){ev.stopPropagation();seleccionar(el.getAttribute("data-t"));};
  });
}

function seleccionar(id){
  var p=(DATA.proyectos||[])[SEL_P];if(!p||!p.live)return;
  SEL_T=(SEL_T===id)?null:id;
  var t=null;p.live.tramites.forEach(function(x){if(x.id===id)t=x;});
  if(SEL_T&&t&&!filtrar(t)){
    /* el destino esta oculto por el filtro: se quita el filtro para
       poder resaltar su cadena completa */
    FILTRO="todos";pintar();
  }else{
    pintarGantt();
  }
  if(SEL_T){
    abrirFicha(p,id);
    var fila=document.querySelector('#gwrap .grow[data-t="'+id+'"]');
    if(fila&&fila.scrollIntoView)fila.scrollIntoView({block:"nearest",inline:"nearest"});
  }else cerrarDrawer();
}
function cerrarDrawer(){$("drawer").className="";}
function abrirFicha(p,id){
  var t=null;p.live.tramites.forEach(function(x){if(x.id===id)t=x;});
  if(!t)return;
  var plan=planear(p.live.tramites.slice());
  var desb=plan.items.filter(function(x){return x._deps.indexOf(id)>=0;});
  var fm=function(d){return d?d.toLocaleDateString("es-MX",{day:"numeric",month:"short",year:"2-digit"}):"—"};
  var tt=plan.por[id];
  var h='<span class="x" id="dx">×</span>'+
    '<span class="olab">'+esc(t.id)+'</span> <span class="olab">'+esc(t.ola)+'</span>'+(t.gate?' <span class="olab">🔒 candado</span>':'')+(t.urgente?' <span class="olab warn">🔥 urgente</span>':'')+(t.rc!=="no"&&t.rc?' <span class="olab">'+(t.rc==="banco"?"🏦 ruta banco":"🏗 ruta física")+'</span>':'')+
    '<h3>'+esc(t.nombre)+'</h3>'+
    '<span class="st '+t.estado+'"><span class="p"></span>'+(t.estado==="verde"?"hecho":t.estado==="amar"?"en proceso":"falta")+'</span>';
  h+='<div class="fld"><div class="k">Tiempo</div>'+fm(tt._ini)+' → '+fm(tt._fin)+(t.dur?(' · '+t.dur+' sem'):'')+(tt._inferido?' · <em>estimado por dependencias</em>':'')+(t.fin?(' · cerrado: '+esc(t.fin)):'')+'</div>';
  if(t.autoridad)h+='<div class="fld"><div class="k">Autoridad</div>'+esc(t.autoridad)+'</div>';
  if(t.resp)h+='<div class="fld"><div class="k">Responsable</div>'+esc(t.resp)+'</div>';
  if(t.oficio)h+='<div class="fld"><div class="k">Oficio / folio</div>'+esc(t.oficio)+'</div>';
  if(t.pq)h+='<div class="fld"><div class="k">Por qué importa</div>'+esc(t.pq)+'</div>';
  if(t.dec)h+='<div class="fld"><div class="k">Decisión</div>'+esc(t.dec)+'</div>';
  if(tt._deps.length){h+='<div class="fld"><div class="k">Depende de</div>';tt._deps.forEach(function(d){h+='<span class="depchip" data-d="'+esc(d)+'">'+esc(d)+'</span>';});h+='</div>';}
  if(desb.length){h+='<div class="fld"><div class="k">Desbloquea</div>';desb.forEach(function(d){h+='<span class="depchip" data-d="'+esc(d.id)+'">'+esc(d.id)+'</span>';});h+='</div>';}
  h+='<div class="btns">';
  var bu=safeUrl(p.board_url);
  if(bu)h+='<a class="btn" href="'+esc(bu+(bu.slice(-1)==="/"?"":"/")+"tramites.html#"+encodeURIComponent(t.id))+'" target="_blank" rel="noopener">Abrir en el board</a>';
  var eu=safeUrl(t.edit_url);
  if(eu)h+='<a class="btn ghost" href="'+esc(eu)+'" target="_blank" rel="noopener">✎ Editar fila en el Sheet</a>';
  h+='</div>';
  var dr=$("drawer");dr.innerHTML=h;dr.className="on";
  $("dx").onclick=function(){SEL_T=null;cerrarDrawer();pintarGantt();};
  Array.prototype.forEach.call(dr.querySelectorAll(".depchip"),function(el){
    el.onclick=function(){seleccionar(el.getAttribute("data-d"));};
  });
}

$("badge").onclick=function(){cargar(true);};
var _rto;
window.addEventListener("resize",function(){clearTimeout(_rto);_rto=setTimeout(function(){if(DATA)pintarGantt();},200);});
if(claveGuardada())cargar(false);else pedirClave();
})();
</script>
</body>
